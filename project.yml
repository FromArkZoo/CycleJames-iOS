name: CycleJames
options:
  bundleIdPrefix: com.jamesbrowne
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.1.1"
    CURRENT_PROJECT_VERSION: "4"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  CycleJames:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CycleJames
        excludes:
          - "Resources/Info.plist"
    resources:
      - CycleJames/Resources/Assets.xcassets
      - CycleJames/Resources/PrivacyInfo.xcprivacy
    info:
      path: CycleJames/Resources/Info.plist
      properties:
        CFBundleDisplayName: CycleJames
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - bluetooth-central
        NSBluetoothAlwaysUsageDescription: "CycleJames uses Bluetooth to connect to your smart trainer and heart rate monitor."
        UIRequiresPersistentWiFi: false
        UIApplicationSupportsIndirectInputEvents: true
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jamesbrowne.cyclejames
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_MACCATALYST: NO
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        DEVELOPMENT_TEAM: 278RL79DB5
        CODE_SIGN_STYLE: Automatic
  CycleJamesTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CycleJamesTests
    dependencies:
      - target: CycleJames
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jamesbrowne.cyclejames.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  CycleJames:
    build:
      targets:
        CycleJames: all
    test:
      targets:
        - CycleJamesTests
    run:
      config: Debug
